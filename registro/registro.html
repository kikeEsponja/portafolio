<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Alejandro">
    <meta name="description" content="plantilla HTML con Bootstrap">
    <meta name="keywords" content="HTML, CSS, Bootstrap, JavaScript">
    <link rel="shortcut icon" href="https://raw.githubusercontent.com/kikeEsponja/estudio/main/Logo3.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/hint.css/2.7.0/hint.min.css">
    <title>Formulario de registro</title>
    <link rel="stylesheet" href="registro.css" />
  </head>
  <body>
    <h1>Formulario de registro</h1>
    <p>Porfavor, complete los campos con la información requerida</p>
    <form method="post" action='https://register-demo.freecodecamp.org'>
      <fieldset>
        <label for="first-name">Ingrese su nombre: <input id="first-name" name="first-name" type="text" required /></label>
        <label for="last-name">Ingrese su apellido: <input id="last-name" name="last-name" type="text" required /></label>
        <label for="email">Ingrese su Email: <input id="email" name="email" type="email" required /></label>
        <label for="new-password">Configure su contraseña: <input id="new-password" name="new-password" type="password" pattern="[a-z0-5]{8,}" required /></label>
      </fieldset>
      <fieldset>
        <label for="personal-account"><input id="personal-account" type="radio" name="account-type" class="inline" /> Cuenta personal</label>
        <label for="business-account"><input id="business-account" type="radio" name="account-type" class="inline" /> Cuenta corporativa</label>
        <label for="terms-and-conditions">
          <input id="terms-and-conditions" type="checkbox" required name="terms-and-conditions" class="inline" /> Acepto los <a href="../pagConst.html">términos y condiciones</a>
        </label>
      </fieldset>
      <fieldset>
        <label for="profile-picture">Agregar foto de perfil: <input id="profile-picture" type="file" name="file" /></label>
        <label for="age">Ingrese su edad: <input id="age" type="number" name="age" min="13" max="120" /></label>
        <label for="referrer">Cómo nos conoció?
          <select id="referrer" name="referrer">
            <option value="">(elegir)</option>
            <option value="1">Prensa</option>
            <option value="2">YouTube</option>
            <option value="3">Foros</option>
            <option value="4">Otros</option>
          </select>
        </label>
        <label for="bio">Acerca de usted:
          <textarea id="bio" name="bio" rows="3" cols="30" placeholder="I like coding on the beach..."></textarea>
        </label>
      </fieldset>
      <input type="submit" value="Enviar" />
    </form>
  </body>
</html>
